name: Auto Commit Daily
on:
  schedule:
    # Jam 8 pagi WIB (01:00 UTC) setiap hari
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto commit
        run: |
          git config user.email "ryhndastra@gmail.com"
          git config user.name "ryhndastra"

          MSGS=(
            "chore: daily update"
            "chore: keepalive"
            "chore: daily log update"
            "chore: auto sync"
            "chore: scheduled update"
            "chore: routine maintenance"
            "chore: periodic sync"
            "fix: minor adjustment"
            "docs: update log"
            "refactor: cleanup"
          )

          # Random jumlah commit antara 10-30
          MIN=10
          MAX=30
          COUNT=$((MIN + RANDOM % (MAX - MIN + 1)))
          echo "Today's commit count: $COUNT"

          for i in $(seq 1 $COUNT); do
            DATE=$(date '+%Y-%m-%d %H:%M:%S')
            MSG=${MSGS[$RANDOM % ${#MSGS[@]}]}

            echo "[$DATE] entry #$i" >> LAST_UPDATED
            git add LAST_UPDATED
            git commit -m "$MSG"

            # Random delay 1-5 detik biar timestamp tiap commit beda
            sleep $((1 + RANDOM % 5))
          done

          git push
